<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CleanTrack">
<meta name="theme-color" content="#1D9E75">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>CleanTrack</title>
<style>
:root{--green:#1D9E75;--green-dark:#0F6E56;--green-light:#e8f5f1;--green-mid:#9FE1CB;--gray-bg:#f5f5f5;--gray-border:#e8e8e8;--gray-text:#888;--text:#1a1a1a;--white:#fff;--red:#e24b4a;--red-light:#fff0f0;--amber-light:#fef3e2;--amber:#a06000}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;color:var(--text);background:var(--gray-bg);min-height:100vh;min-height:100dvh}
.app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;max-width:620px;margin:0 auto;background:var(--white)}
.header{background:var(--white);border-bottom:1px solid var(--gray-border);padding:10px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;overflow:hidden}
.logo{display:flex;align-items:center;gap:6px;font-weight:700;font-size:15px;color:var(--text);text-decoration:none;flex-shrink:0}
.logo-icon{width:26px;height:26px;background:var(--green);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.nav{display:flex;gap:2px}
.nav button{background:none;border:none;cursor:pointer;padding:5px 6px;border-radius:8px;font-size:11px;color:var(--gray-text);display:flex;align-items:center;gap:2px;font-family:inherit;font-weight:500;transition:all .15s;white-space:nowrap}
.nav button.active{background:var(--green-light);color:var(--green);font-weight:700}
.nav button:active{opacity:.7}
.content{flex:1;padding:12px}
.hidden{display:none!important}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px;color:var(--gray-text);font-size:14px}
.spinner{width:32px;height:32px;border:3px solid var(--gray-border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.setup-card{background:var(--white);border:1px solid var(--gray-border);border-radius:16px;padding:24px 20px;margin-bottom:14px}
.setup-card h2{font-size:17px;font-weight:700;margin-bottom:6px}
.setup-card p{font-size:14px;color:#555;line-height:1.6;margin-bottom:14px}
.setup-input{width:100%;border:1px solid var(--gray-border);border-radius:10px;padding:11px 13px;font-size:15px;font-family:inherit;outline:none;color:var(--text);transition:border .15s}
.setup-input:focus{border-color:var(--green)}
.setup-hint{font-size:12px;color:var(--gray-text);margin-top:5px;line-height:1.5}
.date-header{font-size:14px;color:#555;text-align:center;padding:10px 14px;background:var(--gray-bg);border-radius:10px;margin-bottom:14px;font-weight:600}
.appt-block{border-radius:13px;padding:14px 16px;margin-bottom:9px;cursor:pointer;transition:opacity .15s;user-select:none;-webkit-user-select:none}
.appt-block:active{opacity:.82}
.ab-row{display:flex;align-items:center;justify-content:space-between}
.ab-time{font-weight:700;font-size:15px}
.ab-status{font-size:12px;opacity:.85;background:rgba(255,255,255,.2);padding:2px 9px;border-radius:20px;font-weight:600}
.ab-name{font-size:15px;margin-top:5px;font-weight:600}
.ab-addr{font-size:13px;margin-top:2px;opacity:.75}
.ab-svc{font-size:13px;margin-top:4px;opacity:.82;font-style:italic}
.ab-price{font-size:13px;margin-top:3px;opacity:.85;font-weight:600}
.btn-new-big{display:flex;align-items:center;justify-content:center;gap:10px;background:var(--green);color:#fff;border:none;border-radius:14px;padding:18px;font-size:17px;font-weight:700;cursor:pointer;width:100%;margin-top:18px;font-family:inherit;transition:background .15s}
.btn-new-big:active{background:var(--green-dark)}
.empty-home{text-align:center;padding:36px 16px;color:#bbb;font-size:14px}
.empty-home .ei{font-size:38px;margin-bottom:10px}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:13px;flex-wrap:wrap}
.toolbar input{flex:1;min-width:120px;border:1px solid var(--gray-border);border-radius:10px;padding:9px 12px;background:var(--white);color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:border .15s}
.toolbar input:focus{border-color:var(--green)}
.btn-primary{background:var(--green);color:#fff;border:none;border-radius:10px;padding:9px 15px;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;gap:5px;white-space:nowrap;font-family:inherit;transition:background .15s}
.btn-primary:active{background:var(--green-dark)}
.btn-sm{border:1px solid var(--gray-border);background:var(--white);border-radius:8px;padding:6px 8px;cursor:pointer;font-size:13px;color:#444;display:flex;align-items:center;gap:3px;font-family:inherit;white-space:nowrap;font-weight:500;transition:all .15s}
.btn-sm:active{background:var(--gray-bg)}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:active{background:var(--red-light)}
.card{background:var(--white);border:1px solid var(--gray-border);border-radius:14px;padding:10px 10px;margin-bottom:12px}
.client-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #f2f2f2}
.client-row:last-child{border-bottom:none}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--green-dark);flex-shrink:0}
.client-info{flex:1;min-width:0}
.client-name{font-weight:600;font-size:15px}
.client-meta{font-size:12px;color:var(--gray-text);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-actions{display:flex;gap:4px;flex-shrink:0}
.appt-row{display:flex;align-items:center;gap:6px;padding:10px 2px;border-bottom:1px solid #f2f2f2;min-width:0;overflow:hidden}
.appt-row:last-child{border-bottom:none}
.appt-date-box{min-width:60px;text-align:center;background:var(--gray-bg);border-radius:10px;padding:7px 4px;flex-shrink:0}
.appt-d{font-size:20px;font-weight:800;line-height:1;color:var(--green)}
.appt-m{font-size:10px;color:var(--gray-text);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.appt-info{flex:1;min-width:0;overflow:hidden}
.appt-name{font-weight:600;font-size:14px}
.appt-meta{font-size:12px;color:var(--gray-text);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.badge-ok{background:var(--green-light);color:var(--green-dark)}
.badge-plan{background:var(--amber-light);color:var(--amber)}
.empty{text-align:center;padding:36px 16px;color:#bbb;font-size:14px}
.empty .ei{font-size:36px;margin-bottom:10px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.52);display:flex;align-items:flex-end;justify-content:center;z-index:100}
@media(min-width:520px){.overlay{align-items:center;padding:16px}}
.modal{background:var(--white);border-radius:22px 22px 0 0;padding:22px 18px 36px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
@media(min-width:520px){.modal{border-radius:18px;padding:24px 22px 24px}}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 18px}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px}
.form-row{margin-bottom:13px}
.form-row label{display:block;font-size:13px;color:#555;margin-bottom:4px;font-weight:600}
.form-row input,.form-row select,.form-row textarea{width:100%;border:1px solid var(--gray-border);border-radius:10px;padding:11px 13px;background:var(--white);color:var(--text);font-size:16px;font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;transition:border .15s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--green)}
.form-row textarea{resize:vertical;min-height:70px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.step-bar{display:flex;align-items:center;gap:6px;margin-bottom:20px}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid var(--gray-border);color:#bbb;flex-shrink:0;transition:all .2s}
.step-dot.active{background:var(--green);color:#fff;border-color:var(--green)}
.step-dot.done{background:var(--green-light);color:var(--green-dark);border-color:var(--green-mid)}
.step-line{flex:1;height:2px;background:var(--gray-border);border-radius:1px}
.client-pick-list{max-height:280px;overflow-y:auto;-webkit-overflow-scrolling:touch;margin-top:4px}
.client-pick-row{display:flex;align-items:center;gap:11px;padding:12px 13px;border:1px solid #eee;border-radius:11px;margin-bottom:7px;cursor:pointer;transition:all .1s;user-select:none}
.client-pick-row:active,.client-pick-row.selected{background:var(--green-light);border-color:var(--green-mid)}
.sel-client-box{background:var(--gray-bg);border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:14px;font-weight:600;color:#333;line-height:1.4}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:11px 20px;border-radius:22px;font-size:14px;font-weight:600;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;margin-left:6px;display:inline-block;transition:background .3s}
.sync-dot.syncing{background:#f5a623;animation:pulse 1s infinite}
.sync-dot.ok{background:var(--green)}
.sync-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.color-picker{display:flex;gap:10px;flex-wrap:wrap;padding:4px 0}
.color-opt{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .15s,border .15s;flex-shrink:0}
.color-opt:active{transform:scale(.9)}
.color-opt.selected{border-color:#fff;box-shadow:0 0 0 2.5px #1a1a1a;transform:scale(1.1)}
.view-switcher{display:flex;gap:4px;background:var(--gray-bg);border-radius:10px;padding:4px;margin-bottom:14px}
.view-btn{flex:1;padding:7px;border:none;background:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--gray-text);font-family:inherit;transition:all .15s}
.view-btn.active{background:var(--white);color:var(--green);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.group-label{font-size:12px;font-weight:700;color:var(--gray-text);text-transform:uppercase;letter-spacing:.05em;padding:6px 2px;margin-bottom:6px;border-bottom:1px solid var(--gray-border)}
.month-label{font-size:14px;font-weight:700;color:var(--text);padding:6px 2px;margin-bottom:8px;border-bottom:2px solid var(--green)}
.group-block{margin-bottom:16px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <a class="logo" href="#">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C12 2 5 10 5 15a7 7 0 0014 0C19 10 12 2 12 2z"/></svg>
      </div>
      CleanTrack
      <span class="sync-dot" id="sync-dot"></span>
    </a>
    <button onclick="hardReset()" style="background:none;border:none;cursor:pointer;font-size:10px;color:#bbb;padding:3px 5px;border-radius:6px;font-family:inherit;flex-shrink:0">&#8635;</button>
    <div class="nav">
      <button class="active" onclick="showTab('home')" id="tab-home">&#127968; Vandaag</button>
      <button onclick="showTab('clients')" id="tab-clients">&#128101; Klanten</button>
      <button onclick="showTab('agenda')" id="tab-agenda">&#128197; Agenda</button>
    </div>
  </div>
  <div class="content">
    <div id="view-setup">
      <div class="setup-card">
        <h2>&#9881;&#65039; Eerste keer instellen</h2>
        <p>Voer de URL van je Google Apps Script in.</p>
        <input class="setup-input" id="setup-url" type="url" placeholder="https://script.google.com/macros/s/..." autocomplete="off">
        <div class="setup-hint">Kopieer de "Web app URL" uit de installatiegids.</div>
        <div style="margin-top:14px">
          <button class="btn-primary" onclick="saveSetup()" style="width:100%;justify-content:center;padding:13px">Verbinding testen &amp; opslaan</button>
        </div>
      </div>
    </div>
    <div id="view-loading" class="hidden">
      <div class="loading"><div class="spinner"></div><span>Gegevens laden...</span></div>
    </div>
    <div id="view-home" class="hidden">
      <div class="date-header" id="home-date"></div>
      <div id="home-appts"></div>
      <button class="btn-new-big" onclick="openNewApptWizard()">&#128203;&nbsp; Nieuwe opdracht</button>
    </div>
    <div id="view-clients" class="hidden">
      <div class="toolbar">
        <input type="text" id="client-search" placeholder="&#128269; Zoek klant..." oninput="renderClients()">
        <button class="btn-primary" onclick="openClientModal()">+ Nieuwe klant</button>
      </div>
      <input type="file" id="csv-input" accept=".csv,.CSV,.xls,.XLS,.xlsx,.XLSX" class="hidden" onchange="importCSV(event)">
      <div class="card"><div id="client-list"></div></div>
    </div>
    <div id="view-agenda" class="hidden">
      <div class="toolbar">
        <input type="text" id="appt-search" placeholder="&#128269; Zoek op naam..." oninput="renderAppts()">
        <button class="btn-primary" onclick="openNewApptWizard()">+ Nieuwe opdracht</button>
      </div>
      <div class="view-switcher">
        <button class="view-btn active" id="vbtn-dag" onclick="setAgendaView('dag')">Dag</button>
        <button class="view-btn" id="vbtn-week" onclick="setAgendaView('week')">Week</button>
        <button class="view-btn" id="vbtn-maand" onclick="setAgendaView('maand')">Maand</button>
      </div>
      <div id="appt-list"></div>
    </div>
  </div>
</div>

<!-- CLIENT MODAL -->
<div class="overlay hidden" id="client-modal" onclick="bgClose(event,'client-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="client-modal-title">Nieuwe klant</h2>
    <div class="form-row"><label>Naam *</label><input id="c-name" type="text" placeholder="Jan Janssen" autocomplete="name"></div>
    <div class="form-row"><label>Adres</label><input id="c-addr" type="text" placeholder="Kerkstraat 12" autocomplete="street-address"></div>
    <div class="form-row"><label>Postcode &amp; gemeente</label><input id="c-city" type="text" placeholder="3390 Tielt-Winge"></div>
    <div class="form-row"><label>GSM / telefoon</label><input id="c-phone" type="tel" placeholder="0471 23 45 67" autocomplete="tel"></div>
    <div class="form-row"><label>E-mail</label><input id="c-email" type="email" placeholder="jan@email.be" autocomplete="email"></div>
    <div class="form-row"><label>Standaardprijs (&#8364;)</label><input id="c-price" type="number" min="0" step="0.5" placeholder="45"></div>
    <div class="form-row"><label>Notities</label><textarea id="c-notes" placeholder="Bv. hond in tuin, 2e verdieping..."></textarea></div>
    <div class="modal-actions">
      <button class="btn-sm" onclick="closeModals()">Annuleren</button>
      <button class="btn-primary" onclick="saveClient()">Opslaan</button>
    </div>
  </div>
</div>

<!-- APPT WIZARD -->
<div class="overlay hidden" id="appt-wizard" onclick="bgClose(event,'appt-wizard')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="step-bar">
      <div class="step-dot active" id="sdot1">1</div>
      <div class="step-line"></div>
      <div class="step-dot" id="sdot2">2</div>
      <div class="step-line"></div>
      <div class="step-dot" id="sdot3">3</div>
    </div>
    <div id="wiz-step1">
      <h2>Welke klant?</h2>
      <div class="form-row"><input type="text" id="wiz-search" placeholder="&#128269; Zoek klant..." oninput="renderWizClients()"></div>
      <div class="client-pick-list" id="wiz-client-list"></div>
      <div style="margin-top:12px;display:flex;gap:8px;justify-content:space-between;flex-wrap:wrap">
        <button class="btn-sm" onclick="closeModals()">Annuleren</button>
        <button class="btn-sm" onclick="openClientModal(null,true)">+ Nieuwe klant aanmaken</button>
      </div>
    </div>
    <div id="wiz-step2" class="hidden">
      <h2>Wanneer?</h2>
      <div class="sel-client-box" id="wiz-selected-client"></div>
      <div class="form-row"><label>Datum *</label><input id="w-date" type="date"></div>
      <div class="form-row"><label>Tijdstip</label><input id="w-time" type="time" value="08:00"></div>
      <div class="modal-actions">
        <button class="btn-sm" onclick="setWizStep(1)">&#8592; Terug</button>
        <button class="btn-primary" onclick="wizToStep3()">Verder &#8594;</button>
      </div>
    </div>
    <div id="wiz-step3" class="hidden">
      <h2>Details</h2>
      <div class="form-row"><label>Dienst</label>
        <select id="w-service">
          <option value="">&#8212; Kies dienst &#8212;</option>
          <option>Ramen wassen buiten</option>
          <option>Ramen wassen binnen en buiten</option>
          <option>Ramen wassen binnen</option>
          <option>Dakgoten reinigen</option>
          <option>Osmose</option>
        </select>
      </div>
      <div class="form-row"><label>Prijs (&#8364;)</label><input id="w-price" type="number" min="0" step="0.5" placeholder="45"></div>
      <div class="form-row"><label>Kleur</label>
        <div class="color-picker" id="w-color-picker">
          <div class="color-opt selected" data-color="" style="background:#1D9E75"></div>
          <div class="color-opt" data-color="red" style="background:#e24b4a"></div>
          <div class="color-opt" data-color="orange" style="background:#f5a623"></div>
          <div class="color-opt" data-color="blue" style="background:#2980b9"></div>
          <div class="color-opt" data-color="purple" style="background:#8e44ad"></div>
          <div class="color-opt" data-color="dark" style="background:#3a3a3a"></div>
        </div>
      </div>
      <div class="form-row"><label>Notities</label><textarea id="w-notes" placeholder="Extra info..."></textarea></div>
      <div class="modal-actions">
        <button class="btn-sm" onclick="setWizStep(2)">&#8592; Terug</button>
        <button class="btn-primary" onclick="saveWizAppt()">&#10003; Opslaan</button>
      </div>
    </div>
  </div>
</div>

<!-- APPT EDIT MODAL -->
<div class="overlay hidden" id="appt-modal" onclick="bgClose(event,'appt-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Afspraak bewerken</h2>
    <div class="form-row"><label>Klant</label><select id="a-client"></select></div>
    <div class="form-row"><label>Datum *</label><input id="a-date" type="date"></div>
    <div class="form-row"><label>Tijdstip</label><input id="a-time" type="time"></div>
    <div class="form-row"><label>Dienst</label>
      <select id="a-service">
        <option value="">&#8212; Kies dienst &#8212;</option>
        <option>Ramen wassen buiten</option>
        <option>Ramen wassen binnen en buiten</option>
        <option>Ramen wassen binnen</option>
        <option>Dakgoten reinigen</option>
        <option>Osmose</option>
      </select>
    </div>
    <div class="form-row"><label>Prijs (&#8364;)</label><input id="a-price" type="number" min="0" step="0.5"></div>
    <div class="form-row"><label>Status</label>
      <select id="a-status"><option value="gepland">Gepland</option><option value="gedaan">Gedaan</option></select>
    </div>
    <div class="form-row"><label>Kleur</label>
      <div class="color-picker" id="a-color-picker">
        <div class="color-opt selected" data-color="" style="background:#1D9E75"></div>
        <div class="color-opt" data-color="red" style="background:#e24b4a"></div>
        <div class="color-opt" data-color="orange" style="background:#f5a623"></div>
        <div class="color-opt" data-color="blue" style="background:#2980b9"></div>
        <div class="color-opt" data-color="purple" style="background:#8e44ad"></div>
        <div class="color-opt" data-color="dark" style="background:#3a3a3a"></div>
      </div>
    </div>
    <div class="form-row"><label>Notities</label><textarea id="a-notes"></textarea></div>
    <div class="modal-actions">
      <button class="btn-sm btn-danger" onclick="deleteApptEdit()">&#128465; Verwijderen</button>
      <button class="btn-sm" onclick="closeModals()">Annuleren</button>
      <button class="btn-primary" onclick="saveAppt()">Opslaan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SCRIPT_URL = localStorage.getItem('ct_script_url') || 'https://script.google.com/macros/s/AKfycbyJNYvF7c4XwfEezPJ3tXZtmz6HJSTcCroczZInjBsEgeoI-qX3jinn4SzHyhp8-FY4hg/exec';
var clients = JSON.parse(localStorage.getItem('ct_clients') || '[]');
var appts   = JSON.parse(localStorage.getItem('ct_appts')   || '[]');
var editClientId = null, editApptId = null, wizClientId = null, afterNewClient = false;
var agendaView = 'dag';

var colorMap = {'':'#1D9E75','red':'#e24b4a','orange':'#f5a623','blue':'#2980b9','purple':'#8e44ad','dark':'#3a3a3a'};
var DAYS = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
var MONTHS = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
var MN = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function today(){ return new Date().toISOString().slice(0,10); }
function initials(n){ return n.trim().split(/\s+/).map(function(w){return w[0];}).join('').toUpperCase().slice(0,2); }
function clientById(id){ return clients.find(function(x){return x.id===id;}); }
function clientName(id){ var c=clientById(id); return c?c.name:'?'; }
function saveLocal(){ localStorage.setItem('ct_clients',JSON.stringify(clients)); localStorage.setItem('ct_appts',JSON.stringify(appts)); }

function setSyncDot(s){ var d=document.getElementById('sync-dot'); d.className='sync-dot '+s; }
function toast(msg,dur){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},dur||2200); }

function api(params){
  setSyncDot('syncing');
  return fetch(SCRIPT_URL+'?t='+Date.now(),{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(params),cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(data){setSyncDot('ok');setTimeout(function(){setSyncDot('');},2000);return data;})
    .catch(function(err){setSyncDot('err');throw err;});
}

function normalizeAppts(arr){
  return (arr||[]).map(function(a){
    if(!a.date) return a;
    var ds=String(a.date).trim();
    if(/^\d{4}-\d{2}-\d{2}$/.test(ds)) return a;
    var d=new Date(ds);
    if(!isNaN(d)&&d.getFullYear()>1900) a.date=d.toISOString().slice(0,10);
    return a;
  });
}

function loadAll(){
  if(!SCRIPT_URL){showSetup();return;}
  showLoading();
  api({action:'getAll'}).then(function(data){
    if(data.clients) clients=data.clients;
    if(data.appts)   appts=normalizeAppts(data.appts);
    saveLocal();hideLoading();showTab('home');
  }).catch(function(){hideLoading();toast('Offline - lokale data geladen');showTab('home');});
}

function showSetup(){
  document.getElementById('view-setup').classList.remove('hidden');
  ['home','clients','agenda','loading'].forEach(function(v){document.getElementById('view-'+v).classList.add('hidden');});
}
function showLoading(){
  document.getElementById('view-setup').classList.add('hidden');
  ['home','clients','agenda'].forEach(function(v){document.getElementById('view-'+v).classList.add('hidden');});
  document.getElementById('view-loading').classList.remove('hidden');
}
function hideLoading(){ document.getElementById('view-loading').classList.add('hidden'); }
function saveSetup(){
  var url=document.getElementById('setup-url').value.trim();
  if(!url){alert('Vul de URL in.');return;}
  SCRIPT_URL=url; localStorage.setItem('ct_script_url',url); loadAll();
}

function showTab(t){
  document.getElementById('view-setup').classList.add('hidden');
  ['home','clients','agenda'].forEach(function(v){
    document.getElementById('view-'+v).classList.toggle('hidden',v!==t);
    document.getElementById('tab-'+v).classList.toggle('active',v===t);
  });
  if(t==='home') renderHome();
  if(t==='clients') renderClients();
  if(t==='agenda') renderAppts();
}

function renderHome(){
  var now=new Date(), td=today();
  var el=document.getElementById('home-date');
  if(el) el.textContent=DAYS[now.getDay()]+' '+now.getDate()+' '+MONTHS[now.getMonth()]+' '+now.getFullYear();
  var todayA=appts.filter(function(a){return String(a.date||'').slice(0,10)===td;})
                  .sort(function(a,b){return (a.time||'').localeCompare(b.time||'');});
  var el2=document.getElementById('home-appts'); if(!el2) return;
  if(!todayA.length){el2.innerHTML='<div class="empty-home"><div class="ei">&#9728;&#65039;</div>Geen opdrachten vandaag</div>';return;}
  el2.innerHTML=todayA.map(function(a){
    var c=clientById(a.clientId);
    var addr=c?[c.addr,c.city].filter(Boolean).join(', '):'';
    var bg=(a.color&&colorMap[a.color])?colorMap[a.color]:(a.status==='gedaan'?'#3a3a3a':'#1D9E75');
    return '<div class="appt-block" style="background:'+bg+';color:#fff" onclick="oAM(this)" data-id="'+a.id+'">'+
      '<div class="ab-row"><span class="ab-time">'+(a.time&&a.time.indexOf('1899')===-1&&a.time.indexOf('GMT')===-1?a.time:'&#8211;')+'</span>'+
      '<span class="ab-status">'+(a.status==='gedaan'?'&#10003; Gedaan':'Gepland')+'</span></div>'+
      '<div class="ab-name">'+clientName(a.clientId)+'</div>'+
      (addr?'<div class="ab-addr">&#128205; '+addr+'</div>':'')+
      (a.service?'<div class="ab-svc">'+a.service+'</div>':'')+
      (a.price&&String(a.price).indexOf('1899')===-1?'<div class="ab-price">&#8364; '+a.price+'</div>':'')+
    '</div>';
  }).join('');
}

function renderClients(){
  var q=((document.getElementById('client-search')||{}).value||'').toLowerCase();
  var list=clients.filter(function(c){return !q||c.name.toLowerCase().includes(q)||(c.city||'').toLowerCase().includes(q)||(c.addr||'').toLowerCase().includes(q);});
  list.sort(function(a,b){return a.name.localeCompare(b.name,'nl');});
  var el=document.getElementById('client-list');
  if(!list.length){el.innerHTML='<div class="empty"><div class="ei">&#128101;</div>'+(q?'Geen resultaten':'Nog geen klanten')+'</div>';return;}
  el.innerHTML=list.map(function(c){
    return '<div class="client-row">'+
      '<div class="avatar">'+initials(c.name)+'</div>'+
      '<div class="client-info"><div class="client-name">'+c.name+'</div><div class="client-meta">'+[c.addr,c.city,c.phone].filter(Boolean).join(' &middot; ')+'</div></div>'+
      '<div class="client-actions">'+
        '<button class="btn-sm" onclick="openClientModal(''+c.id+'')">&#9999;&#65039;</button>'+
        '<button class="btn-sm btn-danger" onclick="deleteClient(''+c.id+'')">&#128465;</button>'+
      '</div></div>';
  }).join('');
}

function openClientModal(id,fromWizard){
  afterNewClient=!!fromWizard; editClientId=id||null;
  var c=id?clients.find(function(x){return x.id===id;}):{};
  document.getElementById('client-modal-title').textContent=id?'Klant bewerken':'Nieuwe klant';
  document.getElementById('c-name').value=c.name||'';
  document.getElementById('c-addr').value=c.addr||'';
  document.getElementById('c-city').value=c.city||'';
  document.getElementById('c-phone').value=c.phone||'';
  document.getElementById('c-email').value=c.email||'';
  document.getElementById('c-price').value=c.defaultPrice||'';
  document.getElementById('c-notes').value=c.notes||'';
  if(fromWizard) document.getElementById('appt-wizard').classList.add('hidden');
  document.getElementById('client-modal').classList.remove('hidden');
  setTimeout(function(){document.getElementById('c-name').focus();},100);
}

function saveClient(){
  var name=document.getElementById('c-name').value.trim();
  if(!name){alert('Naam is verplicht');return;}
  var data={name:name,addr:document.getElementById('c-addr').value.trim(),city:document.getElementById('c-city').value.trim(),phone:document.getElementById('c-phone').value.trim(),email:document.getElementById('c-email').value.trim(),defaultPrice:document.getElementById('c-price').value,notes:document.getElementById('c-notes').value.trim()};
  var newId=editClientId;
  if(editClientId){Object.assign(clients.find(function(x){return x.id===editClientId;}),data);data.id=editClientId;}
  else{newId=uid();data.id=newId;clients.push(data);}
  saveLocal();
  api({action:'saveClient',client:data}).catch(function(){toast('Niet gesynchroniseerd');});
  document.getElementById('client-modal').classList.add('hidden');
  if(afterNewClient){
    wizClientId=newId;
    document.getElementById('appt-wizard').classList.remove('hidden');
    var c=clientById(wizClientId);
    document.getElementById('wiz-selected-client').textContent='&#128100; '+c.name+(c.addr?' &middot; '+c.addr:'')+(c.city?', '+c.city:'');
    if(c.defaultPrice) document.getElementById('w-price').value=c.defaultPrice;
    setWizStep(2);
  } else {toast('Klant opgeslagen');renderClients();}
}

function deleteClient(id){
  if(!confirm('Klant verwijderen?')) return;
  clients=clients.filter(function(x){return x.id!==id;});
  saveLocal();api({action:'deleteClient',id:id}).catch(function(){});renderClients();toast('Klant verwijderd');
}

function importCSV(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var text=ev.target.result,count=0,skip=0,batch=[];
    if(text.indexOf('<table')>-1||text.indexOf('<th')>-1){
      var parser=new DOMParser(),doc=parser.parseFromString(text,'text/html'),rows=doc.querySelectorAll('tr');
      if(rows.length<2){alert('Geen klanten gevonden.');return;}
      var hdrs=[];rows[0].querySelectorAll('th,td').forEach(function(c){hdrs.push(c.textContent.trim().toLowerCase());});
      function ci(ns){for(var i=0;i<ns.length;i++){var x=hdrs.findIndex(function(h){return h.includes(ns[i]);});if(x>=0)return x;}return -1;}
      function gc(cells,ns){var i=ci(ns);return(i<0||!cells[i])?'':cells[i].textContent.trim();}
      for(var i=1;i<rows.length;i++){
        var cells=rows[i].querySelectorAll('td');if(cells.length<2)continue;
        var name=gc(cells,['bedrijf','naam','name']);if(!name){skip++;continue;}
        if(clients.find(function(c){return c.name.toLowerCase()===name.toLowerCase();})){skip++;continue;}
        var pc=gc(cells,['pc','postcode']),gem=gc(cells,['gemeente']);
        clients.push({id:uid(),name:name,addr:gc(cells,['adres','straat']),city:pc&&gem?pc+' '+gem:(pc||gem),phone:gc(cells,['gsm','mob'])||gc(cells,['tel']),email:gc(cells,['email','mail']),defaultPrice:gc(cells,['prijs','price']),notes:''});
        batch.push(clients[clients.length-1]);count++;
      }
    }
    saveLocal();
    if(batch.length) api({action:'importClients',clients:batch}).catch(function(){});
    renderClients();alert(count+' klanten geimporteerd'+(skip?' ('+skip+' overgeslagen)':'')+'.');
  };
  reader.readAsText(file,'UTF-8');e.target.value='';
}

function setAgendaView(v){
  agendaView=v;
  ['dag','week','maand'].forEach(function(n){
    var btn=document.getElementById('vbtn-'+n);
    if(btn) btn.classList.toggle('active',n===v);
  });
  renderAppts();
}

function apptRow(a){
  var dateStr=String(a.date||'').slice(0,10);
  var d=new Date(dateStr+'T12:00');
  var time=(a.time&&a.time.indexOf('1899')===-1&&a.time.indexOf('GMT')===-1)?a.time:'';
  var meta=[time,a.service,a.price?'&#8364;'+a.price:''].filter(Boolean).join(' &middot; ');
  var rc=(a.color&&colorMap[a.color])?colorMap[a.color]:(a.status==='gedaan'?'#3a3a3a':'#1D9E75');
  return '<div class="appt-row" style="border-left:4px solid '+rc+';padding-left:8px">'+
    '<div class="appt-date-box"><div class="appt-d">'+dateStr.slice(8)+'</div><div class="appt-m">'+(isNaN(d)?'':MN[d.getMonth()])+'</div></div>'+
    '<div class="appt-info"><div class="appt-name">'+clientName(a.clientId)+'</div><div class="appt-meta">'+meta+'</div></div>'+
    '<span class="badge '+(a.status==='gedaan'?'badge-ok':'badge-plan')+'" style="flex-shrink:0">'+a.status+'</span>'+
    '<div style="display:flex;gap:5px;flex-shrink:0">'+
      '<button class="btn-sm" onclick="openApptModal(''+a.id+'')">&#9999;&#65039;</button>'+
      '<button class="btn-sm btn-danger" onclick="deleteApptById(''+a.id+'')">&#128465;</button>'+
    '</div></div>';
}

function renderAppts(){
  var q=((document.getElementById('appt-search')||{}).value||'').toLowerCase();
  var sorted=appts.filter(function(a){return !q||clientName(a.clientId).toLowerCase().includes(q);})
    .slice().sort(function(a,b){return String(a.date||'').localeCompare(String(b.date||''))||(a.time||'').localeCompare(b.time||'');});
  var el=document.getElementById('appt-list');
  if(!sorted.length){el.innerHTML='<div class="card"><div class="empty"><div class="ei">&#128197;</div>Geen afspraken</div></div>';return;}
  var html='';
  if(agendaView==='dag'){
    var groups={},order=[];
    sorted.forEach(function(a){var ds=String(a.date||'').slice(0,10);if(!groups[ds]){groups[ds]=[];order.push(ds);}groups[ds].push(a);});
    order.forEach(function(ds){
      var d=new Date(ds+'T12:00');
      var label=isNaN(d)?ds:DAYS[d.getDay()]+' '+d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();
      html+='<div class="group-block"><div class="group-label">'+label+'</div><div class="card" style="padding:4px 10px">'+groups[ds].map(apptRow).join('')+'</div></div>';
    });
  } else if(agendaView==='week'){
    var wg={},wo=[];
    sorted.forEach(function(a){
      var ds=String(a.date||'').slice(0,10),d=new Date(ds+'T12:00'),day=d.getDay()||7;
      var mon=new Date(d);mon.setDate(d.getDate()-day+1);
      var sun=new Date(mon);sun.setDate(mon.getDate()+6);
      var wk=mon.toISOString().slice(0,10);
      var wl=mon.getDate()+' '+MONTHS[mon.getMonth()]+' – '+sun.getDate()+' '+MONTHS[sun.getMonth()]+' '+sun.getFullYear();
      if(!wg[wk]){wg[wk]={label:wl,items:[]};wo.push(wk);}wg[wk].items.push(a);
    });
    wo.forEach(function(wk){html+='<div class="group-block"><div class="group-label">Week van '+wg[wk].label+'</div><div class="card" style="padding:4px 10px">'+wg[wk].items.map(apptRow).join('')+'</div></div>';});
  } else {
    var mg={},mo=[];
    sorted.forEach(function(a){
      var ds=String(a.date||'').slice(0,10),d=new Date(ds+'T12:00');
      var mk=isNaN(d)?'?':d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
      var ml=isNaN(d)?'?':MONTHS[d.getMonth()]+' '+d.getFullYear();
      if(!mg[mk]){mg[mk]={label:ml,items:[]};mo.push(mk);}mg[mk].items.push(a);
    });
    mo.forEach(function(mk){html+='<div class="group-block"><div class="month-label">'+mg[mk].label+'</div><div class="card" style="padding:4px 10px">'+mg[mk].items.map(apptRow).join('')+'</div></div>';});
  }
  el.innerHTML=html;
}

function openNewApptWizard(){
  wizClientId=null;
  document.getElementById('wiz-search').value='';
  document.getElementById('w-date').value=today();
  document.getElementById('w-time').value='08:00';
  document.getElementById('w-service').value='';
  document.getElementById('w-price').value='';
  document.getElementById('w-notes').value='';
  setWizStep(1);renderWizClients();initColorPicker('w-color-picker','');
  document.getElementById('appt-wizard').classList.remove('hidden');
  setTimeout(function(){document.getElementById('wiz-search').focus();},150);
}

function setWizStep(n){
  [1,2,3].forEach(function(i){
    document.getElementById('wiz-step'+i).classList.toggle('hidden',i!==n);
    var dot=document.getElementById('sdot'+i);
    dot.classList.toggle('active',i===n);dot.classList.toggle('done',i<n);
  });
}

function wizToStep3(){if(!document.getElementById('w-date').value){alert('Vul een datum in');return;}setWizStep(3);}

function renderWizClients(){
  var q=((document.getElementById('wiz-search')||{}).value||'').toLowerCase();
  var list=clients.filter(function(c){return !q||c.name.toLowerCase().includes(q)||(c.city||'').toLowerCase().includes(q);});
  list.sort(function(a,b){return a.name.localeCompare(b.name,'nl');});
  var el=document.getElementById('wiz-client-list');
  if(!list.length){el.innerHTML='<div style="font-size:14px;color:#bbb;padding:14px;text-align:center">Geen klanten gevonden</div>';return;}
  el.innerHTML=list.map(function(c){
    return '<div class="client-pick-row'+(wizClientId===c.id?' selected':'')+'" onclick="pickWizClient(''+c.id+'')">'+
      '<div class="avatar" style="width:34px;height:34px;font-size:12px">'+initials(c.name)+'</div>'+
      '<div><div style="font-size:15px;font-weight:700">'+c.name+'</div><div style="font-size:12px;color:#999">'+[c.addr,c.city].filter(Boolean).join(', ')+'</div></div></div>';
  }).join('');
}

function pickWizClient(id){
  wizClientId=id;var c=clientById(id);
  document.getElementById('wiz-selected-client').textContent='&#128100; '+c.name+(c.addr?' · '+c.addr:'')+(c.city?', '+c.city:'');
  if(c.defaultPrice) document.getElementById('w-price').value=c.defaultPrice;
  setWizStep(2);
}

function saveWizAppt(){
  var date=document.getElementById('w-date').value;
  if(!wizClientId||!date){alert('Klant en datum zijn verplicht');return;}
  var appt={id:uid(),clientId:wizClientId,date:date,time:document.getElementById('w-time').value,service:document.getElementById('w-service').value,price:document.getElementById('w-price').value,status:'gepland',color:getPickerColor('w-color-picker'),notes:document.getElementById('w-notes').value.trim()};
  appts.push(appt);saveLocal();
  api({action:'saveAppt',appt:appt}).catch(function(){toast('Niet gesynchroniseerd');});
  closeModals();renderHome();renderAppts();toast('Opdracht ingepland');
}

function openApptModal(id){
  editApptId=id;var a=appts.find(function(x){return x.id===id;});if(!a)return;
  document.getElementById('a-client').innerHTML=clients.map(function(c){return '<option value="'+c.id+'"'+(a.clientId===c.id?' selected':'')+'>'+c.name+'</option>';}).join('');
  document.getElementById('a-date').value=a.date;
  document.getElementById('a-time').value=a.time||'';
  document.getElementById('a-service').value=a.service||'';
  document.getElementById('a-price').value=a.price||'';
  document.getElementById('a-status').value=a.status||'gepland';
  document.getElementById('a-notes').value=a.notes||'';
  initColorPicker('a-color-picker',a.color||'');
  document.getElementById('appt-modal').classList.remove('hidden');
}

function saveAppt(){
  var a=appts.find(function(x){return x.id===editApptId;});if(!a)return;
  a.clientId=document.getElementById('a-client').value;
  a.date=document.getElementById('a-date').value;
  a.time=document.getElementById('a-time').value;
  a.service=document.getElementById('a-service').value;
  a.price=document.getElementById('a-price').value;
  a.status=document.getElementById('a-status').value;
  a.color=getPickerColor('a-color-picker');
  a.notes=document.getElementById('a-notes').value;
  saveLocal();api({action:'saveAppt',appt:a}).catch(function(){toast('Niet gesynchroniseerd');});
  closeModals();renderHome();toast('Afspraak opgeslagen');
  if(!document.getElementById('view-agenda').classList.contains('hidden')) renderAppts();
}

function deleteApptEdit(){
  if(!confirm('Afspraak verwijderen?'))return;
  appts=appts.filter(function(x){return x.id!==editApptId;});
  saveLocal();api({action:'deleteAppt',id:editApptId}).catch(function(){});
  closeModals();renderHome();toast('Afspraak verwijderd');
  if(!document.getElementById('view-agenda').classList.contains('hidden')) renderAppts();
}

function deleteApptById(id){
  if(!confirm('Afspraak verwijderen?'))return;
  appts=appts.filter(function(x){return x.id!==id;});
  saveLocal();api({action:'deleteAppt',id:id}).catch(function(){});
  renderAppts();renderHome();toast('Afspraak verwijderd');
}

function initColorPicker(pickerId,color){
  var picker=document.getElementById(pickerId);if(!picker)return;
  picker.querySelectorAll('.color-opt').forEach(function(opt){
    opt.classList.toggle('selected',opt.dataset.color===(color||''));
    opt.onclick=function(){picker.querySelectorAll('.color-opt').forEach(function(o){o.classList.remove('selected');});opt.classList.add('selected');};
  });
}
function getPickerColor(pickerId){var picker=document.getElementById(pickerId);if(!picker)return'';var sel=picker.querySelector('.color-opt.selected');return sel?sel.dataset.color:'';}

function hardReset(){
  if(!confirm('Lokale data wissen en opnieuw laden?'))return;
  var activeTab=document.querySelector('.nav button.active');
  var currentTab=activeTab?activeTab.id.replace('tab-',''):'home';
  localStorage.removeItem('ct_clients');localStorage.removeItem('ct_appts');clients=[];appts=[];
  api({action:'getAll'}).then(function(data){
    if(data.clients) clients=data.clients;
    if(data.appts)   appts=normalizeAppts(data.appts);
    saveLocal();showTab(currentTab);toast('Gesynchroniseerd');
  }).catch(function(){toast('Offline');});
}

function closeModals(){
  ['client-modal','appt-wizard','appt-modal'].forEach(function(id){document.getElementById(id).classList.add('hidden');});
  afterNewClient=false;
}
function bgClose(e,id){if(e.target===document.getElementById(id))closeModals();}

document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible'&&SCRIPT_URL){
    api({action:'getAll'}).then(function(data){
      if(data.clients) clients=data.clients;
      if(data.appts)   appts=normalizeAppts(data.appts);
      saveLocal();
      var activeTab=document.querySelector('.nav button.active');
      if(activeTab){var t=activeTab.id.replace('tab-','');if(t==='home')renderHome();else if(t==='clients')renderClients();else if(t==='agenda')renderAppts();}
    }).catch(function(){});
  }
});

function oAM(el){openApptModal(el.dataset.id||el.getAttribute('data-id'));}
loadAll();
</script>
